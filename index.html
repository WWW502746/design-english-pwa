<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#5f6668">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="for zky">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>for zky</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-label="设计学专业英语学习工具">
        <img class="app-logo" src="./icons/icon-192.png" alt="for zky">
        <div>
          <p class="eyebrow">Design English</p>
          <h1>设计学专业英语学习工具</h1>
          <p class="lede">已支持添加到手机桌面和离线打开。把原来的学习内容接到这个页面后，就可以发给朋友用了。</p>
        </div>
      </section>

      <section class="tool-surface" aria-label="学习工具内容区">
        <div class="empty-state">
          <h2>内容区已准备好</h2>
          <p>把你原来的 HTML 内容放到这里，或把原来的 JS/CSS 文件接进来即可。</p>
        </div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
