<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="设计英语">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<title>设计学专业英语学习工具</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --card-hover: #273549;
  --primary: #38bdf8;
  --accent: #818cf8;
  --success: #4ade80;
  --danger: #f87171;
  --warning: #fbbf24;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --border: #334155;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow-x: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  user-select: none;
  -webkit-user-select: none;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 900px; margin: 0 auto; padding: 16px; padding-bottom: calc(80px + var(--safe-bottom)); }

/* Header */
.header {
  text-align: center; padding: 24px 0 16px;
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 50%, #1e1b4b 100%);
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.header h1 { font-size: 1.5em; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.header p { color: var(--muted); margin-top: 4px; font-size: 0.85em; }

/* Install Banner */
.install-banner {
  display: none; align-items: center; justify-content: space-between;
  background: linear-gradient(135deg, #1e3a5f, #1e293b);
  padding: 12px 16px; border-radius: var(--radius); margin-bottom: 16px;
  border: 1px solid var(--primary);
}
.install-banner span { font-size: 0.85em; color: var(--text); }
.install-banner button {
  background: var(--primary); color: #0f172a; border: none;
  padding: 8px 16px; border-radius: 20px; font-weight: 600; font-size: 0.85em; cursor: pointer;
}

/* Bottom Nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(15,23,42,0.95); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex; justify-content: space-around; align-items: center;
  padding: 8px 8px calc(8px + var(--safe-bottom));
  border-top: 1px solid var(--border); z-index: 100;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 6px 12px; border-radius: 12px; cursor: pointer;
  transition: all 0.2s; color: var(--muted); border: none; background: transparent;
  font-size: 0.7em; font-family: inherit; min-width: 55px;
}
.nav-item .icon { font-size: 1.5em; }
.nav-item.active { color: var(--primary); background: rgba(56,189,248,0.1); }
.nav-item:active { transform: scale(0.95); }

/* Stats bar */
.stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.stat {
  background: var(--card); border-radius: var(--radius); padding: 10px 12px;
  flex: 1; min-width: 60px; text-align: center; border: 1px solid var(--border);
}
.stat .num { font-size: 1.3em; font-weight: 700; color: var(--primary); }
.stat .label { font-size: 0.7em; color: var(--muted); margin-top: 2px; }

/* Flashcard */
.flashcard-outer { perspective: 1000px; margin: 0 auto 16px; touch-action: pan-y; }
.flashcard {
  width: 100%; max-width: 600px; height: 260px; margin: 0 auto;
  position: relative; cursor: pointer;
  transform-style: preserve-3d;
  transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  -webkit-transform-style: preserve-3d;
}
.flashcard.flipped { transform: rotateY(180deg); }
.flashcard-face {
  position: absolute; inset: 0; backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: var(--radius); display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 24px 20px;
  border: 2px solid var(--border); background: var(--card);
  box-shadow: var(--shadow);
}
.flashcard-back { transform: rotateY(180deg); }
.flashcard .term { font-size: 1.6em; font-weight: 700; text-align: center; line-height: 1.3; word-break: break-word; }
.flashcard .hint { color: var(--muted); font-size: 0.78em; margin-top: 12px; }
.flashcard .type-tag {
  position: absolute; top: 14px; left: 14px;
  background: var(--accent); color: #fff; font-size: 0.7em;
  padding: 3px 10px; border-radius: 10px; font-weight: 600;
}

/* Card controls */
.card-controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 12px; }
.btn {
  padding: 9px 16px; border-radius: 22px; border: none;
  cursor: pointer; font-size: 0.85em; font-weight: 600;
  transition: all 0.2s; display: inline-flex; align-items: center; gap: 4px;
  font-family: inherit; -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: var(--primary); color: #0f172a; }
.btn-primary:hover { filter: brightness(1.1); }
.btn-success { background: var(--success); color: #0f172a; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: var(--card-hover); }
.btn-sm { padding: 6px 12px; font-size: 0.78em; }
.btn-lg { padding: 12px 24px; font-size: 0.95em; }

/* Quiz */
.quiz-card { background: var(--card); border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.quiz-card .question { font-size: 1.15em; font-weight: 600; margin-bottom: 16px; line-height: 1.5; }
.quiz-card .question .cn { color: var(--muted); font-size: 0.75em; margin-top: 4px; display: block; }
.options { display: flex; flex-direction: column; gap: 8px; }
.option {
  padding: 13px 16px; background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; cursor: pointer; transition: all 0.2s;
  font-size: 0.9em; touch-action: manipulation;
}
.option:active { transform: scale(0.98); }
.option:hover { background: var(--card-hover); border-color: var(--primary); }
.option.correct { background: #14532d; border-color: var(--success); color: var(--success); }
.option.wrong { background: #450a0a; border-color: var(--danger); color: var(--danger); }
.option.disabled { pointer-events: none; opacity: 0.7; }
.quiz-result { margin-top: 14px; padding: 12px; border-radius: 10px; font-weight: 600; text-align: center; }
.quiz-result.correct { background: #14532d; color: var(--success); }
.quiz-result.wrong { background: #450a0a; color: var(--danger); }

/* Short Answer */
.sa-card {
  background: var(--card); border-radius: var(--radius); padding: 20px;
  border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 12px;
}
.sa-card .sa-question { font-size: 1.05em; font-weight: 600; margin-bottom: 12px; line-height: 1.5; }
.sa-card .sa-question .label { color: var(--accent); font-size: 0.75em; }
.answer-box {
  background: #0f172a; border-radius: 10px; padding: 16px;
  border: 1px solid var(--border); display: none; margin-top: 10px;
  font-size: 0.82em; line-height: 1.7;
}
.answer-box.show { display: block; animation: fadeIn 0.3s ease; }
.answer-box .en { color: var(--success); margin-bottom: 10px; }
.answer-box .cn { color: var(--muted); border-top: 1px solid var(--border); padding-top: 10px; }
.answer-box .cn-label { color: var(--warning); font-weight: 600; font-size: 0.85em; }

/* Search/Filter */
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.search-input {
  flex: 1; min-width: 150px; padding: 9px 14px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 22px; color: var(--text); font-size: 0.88em; outline: none;
  font-family: inherit; -webkit-appearance: none;
}
.search-input:focus { border-color: var(--primary); }
.search-input::placeholder { color: var(--muted); }
select {
  padding: 9px 14px; background: var(--card); border: 1px solid var(--border);
  border-radius: 22px; color: var(--text); font-size: 0.88em; outline: none;
  cursor: pointer; font-family: inherit; -webkit-appearance: none;
}

/* List view */
.term-list { display: flex; flex-direction: column; gap: 5px; max-height: 55vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.term-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 14px; background: var(--card); border-radius: 10px;
  border: 1px solid var(--border); transition: all 0.2s; gap: 10px;
}
.term-item:active { background: var(--card-hover); }
.term-item .chinese { font-weight: 600; font-size: 0.9em; }
.term-item .english { font-size: 0.82em; text-align: right; word-break: break-word; }
.term-item .english.hidden { color: var(--muted); cursor: pointer; font-size: 0.7em; }
.term-item .english.visible { color: var(--primary); cursor: pointer; }

/* Progress bar */
.progress-bar { width: 100%; height: 5px; background: var(--border); border-radius: 3px; margin-bottom: 16px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 3px; transition: width 0.4s; }

/* Category badges */
.category-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.badge { padding: 4px 10px; border-radius: 14px; font-size: 0.7em; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; touch-action: manipulation; }
.badge:active { transform: scale(0.95); }
.badge.all { background: var(--primary); color: #0f172a; }
.badge.normal { background: transparent; border-color: var(--border); color: var(--muted); }
.badge.normal:hover, .badge.active { background: var(--card-hover); color: var(--text); border-color: var(--primary); }

/* Peek hint for flashcard */
.peek-indicator {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  font-size: 0.65em; color: var(--muted); display: flex; align-items: center; gap: 4px;
  animation: bounceHint 2s infinite;
}
@keyframes bounceHint { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes flipIn { from { transform: rotateY(90deg); opacity: 0; } to { transform: rotateY(0); opacity: 1; } }
.flashcard-front { animation: flipIn 0.35s ease; }

/* Swipe feedback */
.swipe-left, .swipe-right { position: fixed; top: 50%; transform: translateY(-50%); font-size: 3em; opacity: 0; transition: opacity 0.2s; z-index: 50; pointer-events: none; }
.swipe-left { left: 10px; }
.swipe-right { right: 10px; }
.swipe-left.active, .swipe-right.active { opacity: 0.7; }

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: var(--success); color: #0f172a; padding: 10px 20px;
  border-radius: 20px; font-weight: 600; font-size: 0.9em; z-index: 200;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 1.5s forwards; pointer-events: none;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* Responsive */
@media (max-width: 480px) {
  .flashcard { height: 220px; }
  .flashcard .term { font-size: 1.3em; }
  .header h1 { font-size: 1.3em; }
  .stats { gap: 6px; }
  .stat { padding: 8px 10px; }
  .stat .num { font-size: 1.1em; }
}

/* Pull-down refresh prevention */
.overscroll-none { overscroll-behavior: none; }

/* Safety area for notch phones */
@supports (padding-top: env(safe-area-inset-top)) {
  .header { padding-top: calc(24px + env(safe-area-inset-top)); }
}
</style>
</head>
<body class="overscroll-none">

<div class="header">
  <h1>🎨 设计学专业英语</h1>
  <p>考研复试面试 · 98词 + 12道简述题</p>
</div>

<!-- Install Banner -->
<div class="install-banner" id="install-banner">
  <span>📲 添加到桌面，像App一样使用</span>
  <button onclick="installPWA()">立即添加</button>
</div>

<!-- Swipe indicators -->
<div class="swipe-left" id="swipe-left">◀</div>
<div class="swipe-right" id="swipe-right">▶</div>

<div class="container" id="main-content">
  <!-- Stats -->
  <div class="stats">
    <div class="stat"><div class="num" id="stat-total">98</div><div class="label">总词汇</div></div>
    <div class="stat"><div class="num" id="stat-mastered">0</div><div class="label">已掌握</div></div>
    <div class="stat"><div class="num" id="stat-pct">0%</div><div class="label">掌握率</div></div>
    <div class="stat"><div class="num" id="stat-streak">0</div><div class="label">🔥连对</div></div>
  </div>

  <!-- ==================== FLASHCARD TAB ==================== -->
  <div id="tab-flashcard">
    <div class="filter-bar">
      <input class="search-input" id="fc-search" placeholder="🔍 搜索词汇..." oninput="filterFlashcards()" enterkeyhint="done">
      <select id="fc-category" onchange="filterFlashcards()">
        <option value="all">全部分类</option>
        <option value="design-types">设计类型</option>
        <option value="design-concepts">设计理念</option>
        <option value="movements">设计运动</option>
        <option value="materials">材料与工艺</option>
        <option value="color">色彩理论</option>
        <option value="visual">视觉元素</option>
        <option value="brand">品牌设计</option>
        <option value="tech">技术相关</option>
        <option value="other">其他</option>
      </select>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="fc-progress" style="width:0%"></div></div>

    <div class="flashcard-outer" id="fc-outer">
      <div class="flashcard" id="flashcard">
        <div class="flashcard-face flashcard-front">
          <div class="type-tag" id="fc-tag">中 → 英</div>
          <div class="term" id="fc-chinese">平面设计</div>
          <div class="peek-indicator">👆 点击翻转 · 左右滑动切换</div>
        </div>
        <div class="flashcard-face flashcard-back">
          <div class="type-tag" id="fc-tag2" style="background:var(--success)">英 ← 中</div>
          <div class="term" id="fc-english" style="color:var(--success)">Graphic Design</div>
          <div class="hint" style="color:var(--muted)">👆 点击翻回</div>
        </div>
      </div>
    </div>

    <div class="card-controls">
      <button class="btn btn-outline btn-sm" onclick="prevCard()">◀</button>
      <button class="btn btn-outline btn-sm" onclick="state.fcFlipped=false;shuffleCards()">🔀</button>
      <button class="btn btn-danger btn-sm" onclick="markUnknown()">😕</button>
      <button class="btn btn-success btn-sm" onclick="markKnown()">✅</button>
      <button class="btn btn-outline btn-sm" onclick="nextCard()">▶</button>
    </div>
    <div style="text-align:center;color:var(--muted);font-size:0.8em" id="fc-counter">1 / 98</div>
  </div>

  <!-- ==================== QUIZ TAB ==================== -->
  <div id="tab-quiz" style="display:none">
    <div class="filter-bar">
      <select id="quiz-category" onchange="startQuiz()">
        <option value="all">全部分类</option>
        <option value="design-types">设计类型</option>
        <option value="design-concepts">设计理念</option>
        <option value="movements">设计运动</option>
        <option value="materials">材料与工艺</option>
        <option value="color">色彩理论</option>
        <option value="visual">视觉元素</option>
        <option value="brand">品牌设计</option>
        <option value="tech">技术相关</option>
        <option value="other">其他</option>
      </select>
      <select id="quiz-count">
        <option value="10">10题</option>
        <option value="20">20题</option>
        <option value="30">30题</option>
        <option value="0">全部</option>
      </select>
      <button class="btn btn-primary btn-sm" onclick="startQuiz()">🔄</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="qz-progress" style="width:0%"></div></div>

    <div class="quiz-card" id="quiz-card">
      <div class="question" id="qz-question"></div>
      <div class="options" id="qz-options"></div>
      <div class="quiz-result" id="qz-result" style="display:none"></div>
    </div>
    <div style="text-align:center;margin-top:10px;">
      <span style="color:var(--muted);font-size:0.8em" id="qz-counter"></span>
    </div>
  </div>

  <!-- ==================== SHORT ANSWER TAB ==================== -->
  <div id="tab-shortanswer" style="display:none">
    <p style="color:var(--muted);margin-bottom:12px;font-size:0.85em">点击问题查看英文答题模板，用于面试口语练习 📖</p>
    <div id="sa-list"></div>
  </div>

  <!-- ==================== LIST TAB ==================== -->
  <div id="tab-list" style="display:none">
    <div class="filter-bar">
      <input class="search-input" id="list-search" placeholder="🔍 搜索中/英文词汇..." oninput="renderList()" enterkeyhint="done">
      <select id="list-category" onchange="renderList()">
        <option value="all">全部分类</option>
        <option value="design-types">设计类型</option>
        <option value="design-concepts">设计理念</option>
        <option value="movements">设计运动</option>
        <option value="materials">材料与工艺</option>
        <option value="color">色彩理论</option>
        <option value="visual">视觉元素</option>
        <option value="brand">品牌设计</option>
        <option value="tech">技术相关</option>
        <option value="other">其他</option>
      </select>
    </div>
    <div class="category-badges" id="list-badges">
      <span class="badge all" onclick="document.getElementById('list-category').value='all';document.getElementById('list-search').value='';renderList();">全部</span>
    </div>
    <div class="term-list" id="term-list"></div>
    <p style="color:var(--muted);font-size:0.75em;text-align:center;margin-top:8px">💡 点击右侧 👁 显示英文，再点隐藏，用于自测</p>
  </div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav" id="bottom-nav">
  <button class="nav-item active" data-tab="flashcard"><span class="icon">🎴</span>闪卡</button>
  <button class="nav-item" data-tab="quiz"><span class="icon">❓</span>测验</button>
  <button class="nav-item" data-tab="shortanswer"><span class="icon">📝</span>简述</button>
  <button class="nav-item" data-tab="list"><span class="icon">📋</span>词表</button>
</nav>

<script>
// ==================== PWA INSTALL ====================
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});

function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(result => {
      if (result.outcome === 'accepted') {
        document.getElementById('install-banner').style.display = 'none';
        showToast('✅ 已添加到桌面！');
      }
      deferredPrompt = null;
    });
  }
}

window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').style.display = 'none';
  showToast('✅ 安装成功！');
});

// ==================== TOAST ====================
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

// ==================== DATA ====================
const categories = {
  'design-types': ['平面设计','工业设计','室内设计','景观设计','交互设计','用户体验设计','视觉传达设计','服装设计','数字媒体艺术设计','动画设计','包装设计','标志设计','色彩设计','版式设计','原型设计','界面设计','图标设计','导航设计','动效设计','品牌形象设计','信息架构'],
  'design-concepts': ['设计思维','设计策略','设计管理','设计美学','设计心理学','功能主义','形式追随功能','简约主义','可持续设计','生态设计','绿色设计','人性化设计','情感化设计','无障碍设计','通用设计','创意','灵感','头脑风暴','用户研究','可用性测试','交互流程','品牌识别','品牌定位','品牌传播','智能设计'],
  'movements': ['设计史','中国设计史','外国设计史','现代主义设计','后现代主义设计','包豪斯','工艺美术运动','新艺术运动','装饰艺术运动'],

let state = {
  currentTab: 'flashcard',
  fcIndex: 0,
  fcFiltered: [...terms],
  fcFlipped: false,
  mastered: new Set(JSON.parse(localStorage.getItem('designEnglishMastered')||'[]')),
  streak: parseInt(localStorage.getItem('designEnglishStreak')||'0'),
  quizQuestions: [],
  quizIndex: 0,
  quizScore: 0,
  quizAnswered: false
};

function saveState() {
  localStorage.setItem('designEnglishMastered', JSON.stringify([...state.mastered]));
  localStorage.setItem('designEnglishStreak', state.streak.toString());
}

function getTermCategory(cn) {
  for (let [cat, items] of Object.entries(categories)) {
    if (items.includes(cn)) return cat;
  }
  return 'other';
}

// ==================== BOTTOM NAV ====================
document.getElementById('bottom-nav').addEventListener('click', e => {
  const btn = e.target.closest('.nav-item');
  if (!btn) return;
  switchTab(btn.dataset.tab);
});

function switchTab(tabName) {
  state.currentTab = tabName;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[data-tab="${tabName}"]`).classList.add('active');
  document.querySelectorAll('[id^="tab-"]').forEach(d => d.style.display = 'none');
  const tabEl = document.getElementById('tab-' + tabName);
  if (tabEl) tabEl.style.display = 'block';
  if (tabName === 'list') renderList();
  if (tabName === 'shortanswer') renderShortAnswers();
  if (tabName === 'quiz') startQuiz();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// ==================== STATS ====================
function updateStats() {
  document.getElementById('stat-total').textContent = terms.length;
  document.getElementById('stat-mastered').textContent = state.mastered.size;
  document.getElementById('stat-pct').textContent = Math.round(state.mastered.size / terms.length * 100) + '%';
  document.getElementById('stat-streak').textContent = state.streak;
}

// ==================== FLASHCARD ====================
function filterFlashcards() {
  const search = document.getElementById('fc-search').value.toLowerCase();
  const cat = document.getElementById('fc-category').value;
  state.fcFiltered = terms.filter(t => {
    if (!t.cn.toLowerCase().includes(search) && !t.en.toLowerCase().includes(search)) return false;
    if (cat !== 'all' && getTermCategory(t.cn) !== cat) return false;
    return true;
  });
  state.fcIndex = 0;
  state.fcFlipped = false;
  renderFlashcard();
}

function renderFlashcard() {
  const list = state.fcFiltered;
  if (list.length === 0) {
    document.getElementById('fc-chinese').textContent = '无匹配结果';
    document.getElementById('fc-english').textContent = 'No results';
    document.getElementById('fc-counter').textContent = '0 / 0';
    document.getElementById('fc-progress').style.width = '0%';
    return;
  }
  state.fcIndex = Math.min(state.fcIndex, list.length - 1);
  const term = list[state.fcIndex];
  document.getElementById('fc-chinese').textContent = term.cn;
  document.getElementById('fc-english').textContent = term.en;
  document.getElementById('fc-counter').textContent = (state.fcIndex + 1) + ' / ' + list.length;
  document.getElementById('fc-progress').style.width = ((state.fcIndex + 1) / list.length * 100) + '%';
  document.getElementById('fc-tag').textContent = state.mastered.has(term.cn) ? '✅ 已掌握' : '中 → 英';
  document.getElementById('fc-tag2').textContent = '英 ← 中';
  state.fcFlipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
}

function flipCard() {
  if (state.fcFiltered.length === 0) return;
  state.fcFlipped = !state.fcFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', state.fcFlipped);
}

function prevCard() {
  if (state.fcFiltered.length === 0) return;
  state.fcIndex = (state.fcIndex - 1 + state.fcFiltered.length) % state.fcFiltered.length;
  state.fcFlipped = false;
  renderFlashcard();
}

function nextCard() {
  if (state.fcFiltered.length === 0) return;
  state.fcIndex = (state.fcIndex + 1) % state.fcFiltered.length;
  state.fcFlipped = false;
  renderFlashcard();
}

function shuffleCards() {
  if (state.fcFiltered.length <= 1) return;
  for (let i = state.fcFiltered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [state.fcFiltered[i], state.fcFiltered[j]] = [state.fcFiltered[j], state.fcFiltered[i]];
  }
  state.fcIndex = 0;
  state.fcFlipped = false;
  renderFlashcard();
}

function markKnown() {
  if (state.fcFiltered.length === 0) return;
  const term = state.fcFiltered[state.fcIndex];
  state.mastered.add(term.cn);
  state.streak++;
  saveState();
  updateStats();
  showToast('✅ 已掌握: ' + term.en);
  nextCard();
}

function markUnknown() {
  if (state.fcFiltered.length === 0) return;
  const term = state.fcFiltered[state.fcIndex];
  state.mastered.delete(term.cn);
  state.streak = 0;
  saveState();
  updateStats();
  showToast('😕 标记为不熟');
  nextCard();
}

// ==================== SWIPE FOR FLASHCARD ====================
(function() {
  let touchStartX = 0, touchStartY = 0;
  const el = document.getElementById('fc-outer');
  const leftHint = document.getElementById('swipe-left');
  const rightHint = document.getElementById('swipe-right');

  el.addEventListener('touchstart', e => {
    if (state.currentTab !== 'flashcard') return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, {passive: true});

  el.addEventListener('touchmove', e => {
    if (state.currentTab !== 'flashcard') return;
    const dx = e.touches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) {
      if (dx > 0) { rightHint.classList.add('active'); leftHint.classList.remove('active'); }
      else { leftHint.classList.add('active'); rightHint.classList.remove('active'); }
    }
  }, {passive: true});

  el.addEventListener('touchend', e => {
    if (state.currentTab !== 'flashcard') return;
    leftHint.classList.remove('active');
    rightHint.classList.remove('active');
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy)) return; // not a swipe
    if (dx > 0) prevCard();
    else nextCard();
  });

  // Click to flip
  document.getElementById('flashcard').addEventListener('click', e => {
    if (state.currentTab !== 'flashcard') return;
    // Don't flip if it was a swipe
    flipCard();
  });
})();

// ==================== QUIZ ====================
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  const cat = document.getElementById('quiz-category').value;
  const count = parseInt(document.getElementById('quiz-count').value);
  let pool = terms.filter(t => cat === 'all' || getTermCategory(t.cn) === cat);
  pool = shuffleArray(pool);
  if (count > 0) pool = pool.slice(0, count);
  if (pool.length === 0) pool = shuffleArray([...terms]).slice(0, 10);

  state.quizQuestions = pool.map(q => {
    const wrongs = shuffleArray(terms.filter(t => t.cn !== q.cn)).slice(0, 3);
    const options = shuffleArray([...wrongs.map(w => w.en), q.en]);
    return { cn: q.cn, correct: q.en, options };
  });
  state.quizIndex = 0;
  state.quizScore = 0;
  state.quizAnswered = false;
  renderQuiz();
}

function renderQuiz() {
  if (state.quizQuestions.length === 0) {
    document.getElementById('qz-question').textContent = '选择分类并点击刷新';
    document.getElementById('qz-options').innerHTML = '';
    document.getElementById('qz-result').style.display = 'none';
    return;
  }
  const q = state.quizQuestions[state.quizIndex];
  document.getElementById('qz-question').innerHTML = q.cn + '<span class="cn">选出正确的英文翻译</span>';
  document.getElementById('qz-options').innerHTML = q.options.map((o, i) =>
    `<div class="option" data-index="${i}" onclick="answerQuiz(this)">${o}</div>`
  ).join('');
  document.getElementById('qz-result').style.display = 'none';
  document.getElementById('qz-counter').textContent = `第 ${state.quizIndex+1}/${state.quizQuestions.length} 题 · 得分: ${state.quizScore}`;
  document.getElementById('qz-progress').style.width = ((state.quizIndex) / state.quizQuestions.length * 100) + '%';
  state.quizAnswered = false;
}

function answerQuiz(el) {
  if (state.quizAnswered) return;
  state.quizAnswered = true;
  const q = state.quizQuestions[state.quizIndex];
  const chosen = q.options[parseInt(el.dataset.index)];
  const resultEl = document.getElementById('qz-result');
  const allOptions = document.querySelectorAll('#qz-options .option');

  allOptions.forEach(o => o.classList.add('disabled'));
  allOptions.forEach(o => {
    if (o.textContent.trim() === q.correct) o.classList.add('correct');
  });

  if (chosen === q.correct) {
    state.quizScore++;
    state.streak++;
    state.mastered.add(q.cn);
    resultEl.className = 'quiz-result correct';
    resultEl.textContent = '✅ 正确！';
    resultEl.style.display = 'block';
  } else {
    state.streak = 0;
    el.classList.add('wrong');
    resultEl.className = 'quiz-result wrong';
    resultEl.textContent = '❌ 错误！正确答案: ' + q.correct;
    resultEl.style.display = 'block';
  }
  saveState();
  updateStats();

  setTimeout(() => {
    state.quizIndex++;
    if (state.quizIndex >= state.quizQuestions.length) {
      const pct = Math.round(state.quizScore/state.quizQuestions.length*100);
      document.getElementById('qz-question').innerHTML = '🎉 测验完成！';
      document.getElementById('qz-options').innerHTML = '';
      resultEl.className = `quiz-result ${pct >= 70 ? 'correct' : 'wrong'}`;
      resultEl.textContent = `得分: ${state.quizScore}/${state.quizQuestions.length} (${pct}%)`;
      resultEl.style.display = 'block';
      document.getElementById('qz-counter').textContent = '点击 🔄 再来一轮';
      document.getElementById('qz-progress').style.width = '100%';
    } else {
      renderQuiz();
    }
    state.quizAnswered = false;
  }, 1200);
}

// ==================== SHORT ANSWER ====================
function renderShortAnswers() {
  document.getElementById('sa-list').innerHTML = shortAnswers.map((sa, i) => `
    <div class="sa-card">
      <div class="sa-question">
        <span class="label">Topic ${i+1}</span><br>
        ${sa.cn}<br>
        <small style="color:var(--muted)">${sa.en}</small>
      </div>
      <button class="btn btn-outline btn-sm" onclick="toggleAnswer(${i})">📖 查看答题模板</button>
      <div class="answer-box" id="sa-answer-${i}">
        <div class="en">${sa.answer}</div>
        <div class="cn"><span class="cn-label">中文对照：</span><br>${sa.cnAnswer}</div>
      </div>
    </div>
  `).join('');
}

function toggleAnswer(i) {
  const box = document.getElementById('sa-answer-' + i);
  box.classList.toggle('show');
}

// ==================== LIST ====================
function renderList() {
  const search = document.getElementById('list-search').value.toLowerCase();
  const cat = document.getElementById('list-category').value;
  const filtered = terms.filter(t => {
    if (!t.cn.toLowerCase().includes(search) && !t.en.toLowerCase().includes(search)) return false;
    if (cat !== 'all' && getTermCategory(t.cn) !== cat) return false;
    return true;
  });

  document.getElementById('list-badges').innerHTML = '<span class="badge all" onclick="document.getElementById(\'list-category\').value=\'all\';document.getElementById(\'list-search\').value=\'\';renderList();">全部</span>' +
    Object.entries(categories).map(([k, items]) =>
      `<span class="badge normal" onclick="document.getElementById('list-category').value='${k}';document.getElementById('list-search').value='';renderList();">${items[0]} (${items.length})</span>`
    ).join('');

  const listEl = document.getElementById('term-list');
  if (filtered.length === 0) {
    listEl.innerHTML = '<div style="padding:30px;text-align:center;color:var(--muted)">无匹配词汇</div>';
    return;
  }
  listEl.innerHTML = filtered.map(t => `
    <div class="term-item">
      <span class="chinese">${t.cn}</span>
      <span class="english hidden" onclick="event.stopPropagation();toggleTermEnglish(this)" data-en="${t.en}">👁 点击查看</span>
    </div>
  `).join('');
}

function toggleTermEnglish(el) {
  if (el.classList.contains('hidden')) {
    el.classList.remove('hidden');
    el.classList.add('visible');
    el.textContent = el.dataset.en;
  } else {
    el.classList.remove('visible');
    el.classList.add('hidden');
    el.textContent = '👁 点击查看';
  }
}

// ==================== INIT ====================
function init() {
  updateStats();
  renderFlashcard();
  renderList();
  renderShortAnswers();

  // Reset quiz on first load
  startQuiz();
}

init();
</script>

    navigator.serviceWorker.register("./service-worker.js");
  });
